services:
  app:
    build: .
    container_name: reserva-salas-app
    restart: always
    env_file:
      - .env
    ports:
      # Mapeia a porta 3002 do host para a 3000 do container
      - "3002:3000"
    volumes:
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    platform: linux/arm64